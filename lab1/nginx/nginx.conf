events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        # Round-robin with weights to simulate server performance differences
        # Health checks with max_fails and fail_timeout for automatic failure removal
        server app1:8080 weight=2 max_fails=2 fail_timeout=10s;
        server app2:8080 weight=1 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
